<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MBA Pulse — 5‑Minute Business Brief</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="progress" id="progress"></div>
  <header>
    <nav class="nav">
      <div class="brand"><div class="logo"></div> MBA Pulse</div>
      <div class="navlinks">
        <a href="#top">Home</a>
        <a href="#strategy">Strategy</a>
        <a href="#finance">Finance</a>
        <a href="#leadership">Leadership</a>
        <a href="#subscribe">Subscribe</a>
      </div>
    </nav>
  </header>

  <main class="container" id="top">
    <section class="hero" id="hero"></section>

    <section>
      <div class="sec-head">
        <h2>Top Stories</h2>
        <div class="pill-tabs">
          <a href="#" class="active">All</a>
          <a href="#strategy" id="strategy">Strategy</a>
          <a href="#finance" id="finance">Finance</a>
          <a href="#leadership" id="leadership">Leadership</a>
        </div>
      </div>
      <div class="grid" id="top-stories"></div>
    </section>

    <section>
      <div class="sec-head"><h2>Industry Spotlight</h2></div>
      <div class="card" id="spotlight"></div>
    </section>

    <section>
      <div class="sec-head"><h2>60‑Second Mini Case</h2></div>
      <div class="card" id="mini-case"></div>
    </section>

    <section>
      <div class="qstat">
        <div class="quote" id="quote"></div>
        <div class="stat" id="stat"></div>
      </div>
    </section>

    <section id="subscribe">
      <div class="card">
        <h3>Subscribe to the Weekly MBA Brief</h3>
        <p class="summary">Replace this box with your Google Form embed.</p>
        <div class="embed-placeholder">[ Google Form embed ]</div>
      </div>
    </section>
  </main>

  <footer>© <span id="y"></span> MBA Pulse · Premium prototype</footer>

  <script src="script.js"></script>
</body>
</html>
